<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Multiplication Worksheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        h1 {
            text-align: center;
        }

        input {
            margin: 10px;
            padding: 5px;
        }

        @media print {
            /* Hide input elements when printing */
            input {
                display: none;
            }

            label {
                display: none;
            }

            button {
                display: none;
            }
        }

        .print-btn {
            /* margin-top: 20px; */
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>Custom Multiplication Worksheet</h1>

    <label for="rowCount">Number of Rows:</label>
    <input type="number" id="rowCount" value="6" max="6">

    <label for="colCount">Number of Columns:</label>
    <input type="number" id="colCount" value="6" max="6">

    <button onclick="generateMultiplicationTable()">Generate Worksheet</button>
    
    <button type="button" onclick="printPage()">&nbsp;Print&nbsp;</button>
    

    <table id="multiplicationTable">
        <!-- Table content will be dynamically generated here -->
    </table>

    <script>
        function generateRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateRandomMultiplication() {
            const multiplicand = generateRandomNumber(100, 999);
            const multiplier = generateRandomNumber(10, 99);
            const result = multiplicand * multiplier;

            return {
                multiplicand,
                multiplier,
                result
            };
        }

        function generateMultiplicationTable() {
            const table = document.getElementById('multiplicationTable');
            const rowCount = parseInt(document.getElementById('rowCount').value);
            const colCount = parseInt(document.getElementById('colCount').value);

            // Clear existing content
            table.innerHTML = '';

            for (let i = 0; i < rowCount; i++) {
                const row = document.createElement('tr');

                for (let j = 0; j < colCount; j++) {
                    const multiplication = generateRandomMultiplication();

                    const cell = document.createElement('td');
                    cell.innerHTML = `
                        ${multiplication.multiplicand}<br>
                        x ${multiplication.multiplier}<br>
                        --------<br>
                        <br>
                        <br>
                        <br>
                        <br>
                        <!-- ${multiplication.result} -->
                    `;

                    row.appendChild(cell);
                }

                table.appendChild(row);
            }
        }

        // Initial generation on page load
        generateMultiplicationTable();

        function printPage() {
            window.print();
        }
    </script>

</body>

</html>
