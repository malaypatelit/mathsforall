<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Division Worksheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;

        }

        th {
            background-color: #f2f2f2;
        }

        h1 {
            text-align: center;
        }

        input {
            margin: 10px;
            padding: 5px;
        }

        .division-sum {
            font-family: 'Courier New';
            white-space: normal;
        }

        @media print {
            /* Hide input elements when printing */
            input {
                display: none;
            }

            label {
                display: none;
            }

            button {
                display: none;
            }
        }

        .print-btn {
            /* margin-top: 20px; */
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>Custom Division Worksheet</h1>

    <label for="rowCount">Number of Rows:</label>
    <input type="number" id="rowCount" value="5" max="6">

    <label for="colCount">Number of Columns:</label>
    <input type="number" id="colCount" value="5" max="6">

    <button onclick="generateDivisionTable()">Generate Worksheet</button>

    <button type="button" onclick="printPage()">&nbsp;Print&nbsp;</button>

    <table id="divisionTable">
        <!-- Table content will be dynamically generated here -->
    </table>

    <script>
        function generateRandomNumber(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generateRandomDivision() {
            const dividend = generateRandomNumber(100, 999);
            const divisor = generateRandomNumber(2, 9);
            const quotient = Math.floor(dividend / divisor);
            const remainder = dividend % divisor;

            return {
                dividend,
                divisor,
                quotient,
                remainder
            };
        }

        function generateDivisionTable() {
            const table = document.getElementById('divisionTable');
            const rowCount = parseInt(document.getElementById('rowCount').value);
            const colCount = parseInt(document.getElementById('colCount').value);

            // Clear existing content
            table.innerHTML = '';

            for (let i = 0; i < rowCount; i++) {
                const row = document.createElement('tr');

                for (let j = 0; j < colCount; j++) {
                    const division = generateRandomDivision();

                    const cell = document.createElement('td');
                    cell.innerHTML = `
                        <div class="division-sum">
                            ${'&nbsp;'.repeat(4)}${'_'.repeat(6)}<br>
                            ${division.divisor}&#10188;${division.dividend}<br>
                            ${'<br>'.repeat(6)}
                            <!--${'&nbsp;'.repeat(3)}${division.quotient} -->
                        </div>
                    `;

                    row.appendChild(cell);
                }

                table.appendChild(row);
            }
        }

        // Initial generation on page load
        generateDivisionTable();

        function printPage() {
            window.print();
        }
    </script>

</body>

</html>
