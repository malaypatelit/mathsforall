<!DOCTYPE HTML>
<html>
    <head>
        <title>Division Sheets</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="../../resources/css/main.css" />
        <style>
        #additionTable td, #subtractionTable td, #multiplicationTable td, #divisionTable td { text-align:center; vertical-align:middle; padding:4px; box-sizing:border-box; }
        @media print { @page{size:A4;margin:8mm;} body *{visibility:hidden;} #printableDiv, #printableDiv *{visibility:visible;} #printableDiv{position:absolute;left:0;top:0;width:100%;} table{width:100%;border-collapse:collapse;table-layout:fixed;page-break-inside:auto;} tr{page-break-inside:avoid;page-break-after:auto;} td{border:1px solid #000;padding:6px;break-inside:avoid;} h2{margin:0 0 6px 0;} }
        </style>
    </head>
    <body class="is-preload">
        <div id="wrapper"><div id="main"><div class="inner">
            <header id="header"><a href="../index.html" class="logo"><strong>Division</strong> Worksheets</a></header>
            <div id="printableDiv">
                <h2>Custom Division Worksheet</h2>
                <article>
                    <div class="col-12" style="display:flex;">Set of numbers to divide (integer results):
                        <select name="division-selection" id="division-selection"><option value="">2 X 2</option><option value="1">1 X 1</option><option value="2">2 X 1</option><option value="3">3 X 2</option><option value="4">3 X 3</option><option value="5">4 X 3</option><option value="6">4 X 4</option></select>
                    </div>
                    Rows: <input type="number" id="rowCount" value="8" max="8"/> Columns: <input type="number" id="colCount" value="6" max="6"/>
                    <button class="button primary icon solid fa-search" onclick="generateDivisionTable()">Generate Worksheet</button>
                    <button type="button" class="button icon solid fa-download" onclick="printPage()">Print</button>
                </article>
                <table id="divisionTable"></table>
            </div>
        </div></div>
        <div id="sidebar"><div class="inner">
            <div id="shared-menu" data-menu-path="../../resources/partials/menu.html"></div>
            <section>
                <header class="major"><h2>Related Resources</h2></header>
                <div class="mini-posts" id="related-posts"><!-- injected --></div>
            </section>
        </div></div>
        <script>
            function generateRandomNumber(min,max){return Math.floor(Math.random()*(max-min+1))+min}
            function generateRandomDivision(){const digitSelection=parseInt(document.getElementById('division-selection').value); if(digitSelection===1){const divisor=generateRandomNumber(1,9);const quotient=generateRandomNumber(1,9);const dividend=divisor*quotient;return{dividend,divisor,result:quotient}} if(digitSelection===2){const divisor=generateRandomNumber(1,9);const quotient=generateRandomNumber(10,99);const dividend=divisor*quotient;return{dividend,divisor,result:quotient}} if(digitSelection===3){const divisor=generateRandomNumber(10,99);const quotient=generateRandomNumber(10,99);const dividend=divisor*quotient;return{dividend,divisor,result:quotient}} if(digitSelection===4){const divisor=generateRandomNumber(100,999);const quotient=generateRandomNumber(10,99);const dividend=divisor*quotient;return{dividend,divisor,result:quotient}} if(digitSelection===5){const divisor=generateRandomNumber(100,999);const quotient=generateRandomNumber(100,999);const dividend=divisor*quotient;return{dividend,divisor,result:quotient}} if(digitSelection===6){const divisor=generateRandomNumber(1000,9999);const quotient=generateRandomNumber(1,9);const dividend=divisor*quotient;return{dividend,divisor,result:quotient}} const divisor=generateRandomNumber(10,99);const quotient=generateRandomNumber(10,99);const dividend=divisor*quotient;return{dividend,divisor,result:quotient}}
            function generateDivisionTable(){const table=document.getElementById('divisionTable');const rowCount=parseInt(document.getElementById('rowCount').value);const colCount=parseInt(document.getElementById('colCount').value);table.innerHTML='';for(let i=0;i<rowCount;i++){const row=document.createElement('tr');for(let j=0;j<colCount;j++){const d=generateRandomDivision();const cell=document.createElement('td');cell.innerHTML=`<div style="width:110px;"><div style="text-align:right;font-weight:600;">${d.dividend}</div><div style="text-align:right;"><span style="font-weight:600;margin-right:4px;">&divide;</span><span style="font-weight:600;">${d.divisor}</span></div><div style="text-align:right;">---------</div></div>`;row.appendChild(cell);}table.appendChild(row);} }
            generateDivisionTable(); function printPage(){window.print();}
        </script>
        <script src="../../resources/scripts/menu.js"></script>
        <script data-cfasync="false" src="../../resources/scripts/email-decode.min.js"></script><script src="../../resources/scripts/jquery.min.js"></script>
        <script src="../../resources/scripts/browser.min.js"></script>
        <script src="../../resources/scripts/breakpoints.min.js"></script>
        <script src="../../resources/scripts/util.js"></script>
        <script src="../../resources/scripts/main.js"></script>

                <script>
                (async function(){
                    try{
                        const res = await fetch('../../resources/data/site.json');
                        const data = res.ok ? await res.json() : (window.__INLINE_SITE_DATA || null);
                        const posts = (data && data.posts) || [];
                        const keyword = 'division';
                        const matches = posts.filter(p => (p.link && p.link.includes(keyword)) || (p.title && p.title.toLowerCase().includes(keyword)));
                        const list = matches.length ? matches : posts.slice(0,2);
                        const container = document.getElementById('related-posts');
                        if(container){
                            container.innerHTML = list.map(p=>`<article><a href="${p.link||'#'}" class="image"><img src="${p.image||'../../resources/images/pic07.jpg'}" alt=""/></a><p>${p.excerpt||''}</p></article>`).join('');
                        }
                    }catch(e){}
                })();
                </script>
    </body>
</html>
