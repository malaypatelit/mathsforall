<!DOCTYPE HTML>
<html>
    <head>
        <title>Subtraction Sheets</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="../../resources/css/main.css" />
        <style>
        /* General table cell layout used across worksheets */
        #additionTable td, #subtractionTable td, #multiplicationTable td, #divisionTable td {
          text-align: center;
          vertical-align: middle;
          padding: 4px;
          box-sizing: border-box;
        }

        @media print {
          @page { size: A4; margin: 8mm; }
          body * { visibility: hidden; }
          #printableDiv, #printableDiv * { visibility: visible; }
          #printableDiv { position: absolute; left: 0; top: 0; width: 100%; }
          table { width: 100%; border-collapse: collapse; table-layout: fixed; page-break-inside: auto; }
          tr { page-break-inside: avoid; page-break-after: auto; }
          td { border: 1px solid #000; padding: 6px; break-inside: avoid; }
          h2 { margin: 0 0 6px 0; }
        }
        </style>
    </head>
    <body class="is-preload">

        <div id="wrapper">
            <div id="main"><div class="inner">
                <header id="header">
                    <a href="../index.html" class="logo"><strong>Editorial</strong> by HTML5 UP</a>
                </header>

                <div id="printableDiv">
                    <h2>Custom Subtraction Worksheet</h2>
                    <article>
                        <div class="col-12" style="display: flex;">
                            Set of numbers to subtract:
                            <select name="subtraction-selection" id="subtraction-selection">
                                <option value="">2 X 2</option>
                                <option value="1">1 X 1</option>
                                <option value="2">2 X 1</option>
                                <option value="3">3 X 2</option>
                                <option value="4">3 X 3</option>
                                <option value="5">4 X 3</option>
                                <option value="6">4 X 4</option>
                            </select>
                        </div>
                        Rows: <input type="number" id="rowCount" value="8" max="8"/>
                        Columns: <input type="number" id="colCount" value="6" max="6"/>
                        <button class="button primary icon solid fa-search" onclick="generateSubtractionTable()">Generate Worksheet</button>
                        <button type="button" class="button icon solid fa-download" onclick="printPage()">Print</button>
                    </article>
                    <table id="subtractionTable"></table>
                </div>
            </div></div>

            <div id="sidebar"><div class="inner">
                <section id="search" class="alt"><form method="post" action="#"><input type="text" name="query" id="query" placeholder="Search" /></form></section>
                <div id="shared-menu" data-menu-path="../../resources/partials/menu.html"></div>
                <section><header class="major"><h2>Ante interdum</h2></header>
                    <div class="mini-posts"><article><a href="#" class="image"><img src="../../resources/images/pic07.jpg" alt="" /></a><p>Aenean ornare velit lacus...</p></article></div>
                </section>
                <footer id="footer"><p class="copyright">&copy; Untitled.</p></footer>
            </div></div>

        </div>

        <script>
            function generateRandomNumber(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
            function generateRandomSubtraction() {
                const digitSelection = parseInt(document.getElementById('subtraction-selection').value);
                if(digitSelection === 1) { const a = generateRandomNumber(1,9); const b = generateRandomNumber(1,9); const num1=Math.max(a,b); const num2=Math.min(a,b); return {num1,num2,result:num1-num2}; }
                if(digitSelection === 2) { const num1=generateRandomNumber(10,99); const num2=generateRandomNumber(1,9); return {num1,num2,result:num1-num2}; }
                if(digitSelection === 3) { const num1=generateRandomNumber(100,999); const num2=generateRandomNumber(10,99); return {num1,num2,result:num1-num2}; }
                if(digitSelection === 4) { const a=generateRandomNumber(100,999); const b=generateRandomNumber(100,999); const num1=Math.max(a,b); const num2=Math.min(a,b); return {num1,num2,result:num1-num2}; }
                if(digitSelection === 5) { const num1=generateRandomNumber(1000,9999); const num2=generateRandomNumber(100,999); return {num1,num2,result:num1-num2}; }
                if(digitSelection === 6) { const a=generateRandomNumber(1000,9999); const b=generateRandomNumber(1000,9999); const num1=Math.max(a,b); const num2=Math.min(a,b); return {num1,num2,result:num1-num2}; }
                const num1=generateRandomNumber(10,99); const num2=generateRandomNumber(10,99); return {num1:Math.max(num1,num2), num2:Math.min(num1,num2), result: Math.abs(num1-num2)};
            }
            function generateSubtractionTable() {
                const table=document.getElementById('subtractionTable'); const rowCount=parseInt(document.getElementById('rowCount').value); const colCount=parseInt(document.getElementById('colCount').value); table.innerHTML='';
                for(let i=0;i<rowCount;i++){ const row=document.createElement('tr'); for(let j=0;j<colCount;j++){ const s=generateRandomSubtraction(); const cell=document.createElement('td'); cell.innerHTML = `<div style="width:110px;"><div style="text-align:right;font-weight:600;">${s.num1}</div><div style="text-align:right;"><span style="font-weight:600;margin-right:4px;">-</span><span style="font-weight:600;">${s.num2}</span></div><div style="text-align:right;">---------</div></div>`; row.appendChild(cell);} table.appendChild(row);} }
            generateSubtractionTable(); function printPage(){window.print();}
        </script>
        <script src="../../resources/scripts/menu.js"></script>
        <script data-cfasync="false" src="../../resources/scripts/email-decode.min.js"></script><script src="../../resources/scripts/jquery.min.js"></script>
        <script src="../../resources/scripts/browser.min.js"></script>
        <script src="../../resources/scripts/breakpoints.min.js"></script>
        <script src="../../resources/scripts/util.js"></script>
        <script src="../../resources/scripts/main.js"></script>

    </body>
</html>
