<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Worksheet Generator</title>
    <style>
        /* A4 Page Setup */
        body { margin: 0; padding: 0; background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .controls { 
            background: white; padding: 20px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;
        }

        .page {
            width: 250mm; min-height: 297mm; padding: 15mm 20mm;
            margin: 20px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box; position: relative;
        }

        @media print {
            .controls, .no-print { display: none !important; }
            body { background: none; }
            .page { margin: 0; box-shadow: none; width: 100%; height: 100%; }
        }

        /* Header Styling */
        .header-info { display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 10px; }
        h1 { text-align: center; margin: 0 0 40px 0; font-size: 22pt; color: #222; }

        /* Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px 15px; }
        .question { display: flex; align-items: center; font-size: 14pt; }
        .q-num { font-weight: bold; width: 30px; color: #555; }

        /* Fraction Math Styling */
        .frac-container { display: flex; align-items: center; }
        .frac { display: inline-flex; flex-direction: column; align-items: center; text-align: center; }
        .frac .top { border-bottom: 1.5px solid black; padding: 0 5px; width: 100%; }
        .frac .bottom { padding: 0 5px; }
        .op { margin: 0 10px; font-weight: bold; font-size: 16pt; }
        .equals { margin-left: 10px; border-bottom: 1px dotted #999; min-width: 40px; height: 20px; }

        /* Button Styling */
        button, select { padding: 10px 15px; font-size: 1rem; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; margin: 0 5px; }
        button.generate { background-color: #007bff; color: white; border: none; font-weight: bold; }
        button.generate:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="controls">
        <label>Operation: </label>
        <select id="opSelect">
            <option value="both">Mix (× & ÷)</option>
            <option value="×">Multiplication (×)</option>
            <option value="÷">Division (÷)</option>
        </select>
        <button class="generate" onclick="generateQuestions()">Generate New Sheet</button>
        <button onclick="window.print()">Print PDF</button>
    </div>

    <div class="page">
        <div class="header-info">
            <span>Name: __________________________</span>
            <span>Date: ____ / ____ / ____</span>
        </div>
        
        <h1 id="titleDisplay">Fraction Worksheet</h1>
        
        <div id="worksheet-grid" class="grid">
            <!-- Questions load here -->
        </div>
    </div>

    <script>
        function getRandom() { return Math.floor(Math.random() * 11) + 1; }

        function generateQuestions() {
            const grid = document.getElementById('worksheet-grid');
            const opChoice = document.getElementById('opSelect').value;
            const titleDisplay = document.getElementById('titleDisplay');
            
            // Update Title
            titleDisplay.innerText = opChoice === 'both' ? "Multiplication & Division" : 
                                   (opChoice === '×' ? "Fraction Multiplication" : "Fraction Division");

            grid.innerHTML = ''; // Clear existing

            for (let i = 1; i <= 40; i++) {
                const op = opChoice === 'both' ? (Math.random() > 0.5 ? '×' : '÷') : opChoice;
                const q = document.createElement('div');
                q.className = 'question';
                
                // Numerators and Denominators
                const n1 = getRandom(), d1 = getRandom();
                const n2 = getRandom(), d2 = getRandom();

                q.innerHTML = `
                    <span class="q-num">${i}.</span>
                    <div class="frac-container">
                        <div class="frac"><span class="top">${n1}</span><span class="bottom">${d1}</span></div>
                        <span class="op">${op}</span>
                        <div class="frac"><span class="top">${n2}</span><span class="bottom">${d2}</span></div>
                        &nbsp;=
                        <span class="equals"></span>
                    </div>
                `;
                grid.appendChild(q);
            }
        }

        // Run once on load
        window.onload = generateQuestions;
    </script>
</body>
</html>
